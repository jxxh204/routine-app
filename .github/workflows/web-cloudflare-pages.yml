name: web-cloudflare-pages

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-cloudflare-pages.yml'
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-*'
  workflow_dispatch:

concurrency:
  group: web-cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-ci:
    name: web test/lint/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy-preview:
    name: deploy preview (PR)
    if: github.event_name == 'pull_request'
    needs: web-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build for Cloudflare Pages (Next)
        run: npx @cloudflare/next-on-pages@1

      - name: Deploy preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy apps/web/.vercel/output/static
            --project-name=${{ vars.CF_PAGES_PROJECT }}
            --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '✅ Cloudflare Pages preview deployed',
              '',
              `- Branch: pr-${context.payload.pull_request.number}`,
              `- URL: ${'${{ steps.deploy.outputs.deployment-url }}'}`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  deploy-production:
    name: deploy production (tag)
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: web-ci
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Validate release tag (for push tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          ../../scripts/release/check-tag-before-deploy.sh "$tag"

      - name: Build for Cloudflare Pages (Next)
        run: npx @cloudflare/next-on-pages@1

      - name: Deploy production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy apps/web/.vercel/output/static
            --project-name=${{ vars.CF_PAGES_PROJECT }}
            --branch=main
